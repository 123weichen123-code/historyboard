<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>史镜 HistoryBoard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">历史看板 H5 · 第二版时间轴</p>
        <h1>史镜 HistoryBoard</h1>
        <p class="subtitle">
          在一条连续时间线上查看中国与世界的重要节点，支持单独浏览、并行对照、按朝代或区域筛选。
        </p>
        <div class="search-row">
          <input
            id="searchInput"
            type="text"
            placeholder="例如：秦始皇 / 商鞅变法 / 1911 / 丝绸之路 / 鸦片战争"
            autocomplete="off"
          />
          <button id="searchBtn">立即检索</button>
          <button id="randomBtn" class="ghost">随机看看</button>
        </div>
        <div id="suggestions" class="chips"></div>
      </header>

      <section class="dashboard">
        <aside class="panel results-panel">
          <div class="panel-head">
            <h2>检索结果</h2>
            <span id="resultMeta" class="meta"></span>
          </div>
          <div id="resultList" class="result-list"></div>
        </aside>

        <section class="panel detail-panel">
          <div class="panel-head">
            <h2>事件详情 + 同期世界</h2>
            <span class="meta">点击左侧检索结果或时间轴节点查看详情</span>
          </div>
          <article id="detailCard" class="detail-card empty">请先选择一个历史事件。</article>
          <div>
            <h3 class="timeline-title">同期世界关键节点</h3>
            <div id="worldTimeline" class="world-timeline"></div>
          </div>
        </section>
      </section>

      <section class="panel strip-panel">
        <div class="panel-head">
          <h2>历史时间轴可视化</h2>
          <span id="stripMeta" class="meta"></span>
        </div>
        <div class="timeline-mode-bar">
          <div class="timeline-scope-tabs" role="tablist" aria-label="时间轴范围切换">
            <button type="button" class="ghost scope-tab active" data-scope="china">中国</button>
            <button type="button" class="ghost scope-tab" data-scope="world">世界</button>
            <button type="button" class="ghost scope-tab" data-scope="all">中外并行</button>
          </div>
          <div class="timeline-filter-bar">
            <label class="timeline-filter">
              <span id="filterPrimaryLabel">朝代</span>
              <select id="timelinePrimaryFilter">
                <option value="">全部</option>
              </select>
            </label>
            <label class="timeline-filter secondary-filter" id="secondaryFilterWrap">
              <span id="filterSecondaryLabel">类别</span>
              <select id="timelineSecondaryFilter">
                <option value="">全部</option>
              </select>
            </label>
            <label class="timeline-filter">
              <span>年份范围</span>
              <select id="timelineYearFilter">
                <option value="all">全部年份</option>
                <option value="ancient">古代（-3000 ~ 220）</option>
                <option value="medieval">中古（221 ~ 1368）</option>
                <option value="early_modern">近世（1369 ~ 1911）</option>
                <option value="modern">现代（1912 ~ 至今）</option>
              </select>
            </label>
          </div>
        </div>
        <div id="timeStrip" class="time-strip"></div>
      </section>
    </main>

    <script src="/assets/main.js"></script>
  </body>
</html>
